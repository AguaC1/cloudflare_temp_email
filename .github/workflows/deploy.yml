name: Deploy Cloudflare Temp Email

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "worker/**"
      - "frontend/**"
      - "db/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read

jobs:
  deploy-worker:
    name: Deploy Worker Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: worker/pnpm-lock.yaml

      - name: Generate wrangler.toml
        working-directory: worker
        run: |
          cat > wrangler.toml <<EOF
          name = "${{ secrets.WORKER_NAME }}"
          main = "src/worker.ts"
          compatibility_date = "2024-09-23"
          compatibility_flags = ["nodejs_compat"]

          routes = [
            { pattern = "mail.gameconscious.cn", custom_domain = true }
          ]

          [vars]
          PREFIX = "tmp"
          DOMAINS = ${{ secrets.DOMAINS }}
          DEFAULT_DOMAINS = ${{ secrets.DOMAINS }}
          ENABLE_USER_CREATE_EMAIL = true
          ENABLE_USER_DELETE_EMAIL = true
          ADMIN_PASSWORDS = ${{ secrets.ADMIN_PASSWORDS }}
          JWT_SECRET = "${{ secrets.JWT_SECRET }}"

          [[d1_databases]]
          binding = "DB"
          database_name = "temp-email-db"
          database_id = "${{ secrets.D1_DATABASE_ID }}"
          EOF

      - name: Install Worker Dependencies
        working-directory: worker
        run: pnpm install --no-frozen-lockfile

      - name: Deploy Worker
        working-directory: worker
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-frontend:
    name: Deploy Frontend Pages
    runs-on: ubuntu-latest
    needs: deploy-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Build Frontend
        working-directory: frontend
        run: pnpm build --emptyOutDir
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}

      - name: Deploy Frontend to Cloudflare Pages
        working-directory: frontend
        run: npx wrangler pages deploy dist --project-name=cloudflare-temp-email
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
